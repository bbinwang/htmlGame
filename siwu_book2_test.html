<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四五快读 · 第二册认字测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 24px;
            padding: 36px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
            position: relative;
        }

        /* ===== 首页 ===== */
        .title-emoji { font-size: 3em; margin-bottom: 10px; }
        h1 { color: #2d3436; font-size: 1.8em; margin-bottom: 6px; }
        .subtitle { color: #636e72; font-size: 1em; margin-bottom: 24px; }
        .info-box {
            background: #f8f9fa;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
            line-height: 1.8;
            color: #555;
            font-size: 0.95em;
        }
        .info-box b { color: #2d3436; }

        .btn {
            display: inline-block;
            padding: 16px 40px;
            border: none;
            border-radius: 16px;
            font-size: 1.15em;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .btn:active { transform: scale(0.97); }
        .btn-green { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .btn-blue { background: linear-gradient(135deg, #667eea, #764ba2); }
        .btn-orange { background: linear-gradient(135deg, #f093fb, #f5576c); }

        /* ===== 测试页 ===== */
        .progress-text { color: #999; font-size: 0.95em; margin-bottom: 8px; }
        .progress-bar {
            width: 100%; height: 10px; background: #eee; border-radius: 5px;
            margin-bottom: 28px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #43e97b, #38f9d7);
            border-radius: 5px; transition: width 0.4s ease;
        }

        .char-display {
            font-size: 7em;
            font-weight: bold;
            color: #2d3436;
            margin: 10px 0 8px;
            user-select: none;
            line-height: 1.2;
            transition: color 0.3s, text-shadow 0.3s, transform 0.3s;
        }
        .char-display.hint-active {
            animation: charDance 0.6s ease infinite alternate, charGlow 2s ease infinite;
        }
        @keyframes charDance {
            0% { transform: scale(1) rotate(-3deg); }
            50% { transform: scale(1.12) rotate(3deg); }
            100% { transform: scale(1.05) rotate(-2deg); }
        }
        @keyframes charGlow {
            0%   { color: #e74c3c; text-shadow: 0 0 20px rgba(231,76,60,0.4); }
            16%  { color: #f39c12; text-shadow: 0 0 20px rgba(243,156,18,0.4); }
            33%  { color: #2ecc71; text-shadow: 0 0 20px rgba(46,204,113,0.4); }
            50%  { color: #3498db; text-shadow: 0 0 20px rgba(52,152,219,0.4); }
            66%  { color: #9b59b6; text-shadow: 0 0 20px rgba(155,89,182,0.4); }
            83%  { color: #e91e63; text-shadow: 0 0 20px rgba(233,30,99,0.4); }
            100% { color: #e74c3c; text-shadow: 0 0 20px rgba(231,76,60,0.4); }
        }

        .char-hint {
            color: #b2bec3;
            font-size: 0.9em;
            margin-bottom: 30px;
            min-height: 1.2em;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .btn-group .btn {
            min-width: 140px;
            font-size: 1.3em;
            padding: 18px 32px;
        }
        .btn-hint {
            background: linear-gradient(135deg, #feca57, #ff9f43);
            color: #2d3436;
            font-size: 1em;
            padding: 10px 28px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-hint:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
        .btn-hint:active { transform: scale(0.97); }
        /* ===== 提示动画区域 ===== */
        .hint-anim-area {
            position: relative;
            min-height: 0;
            overflow: visible;
            margin-bottom: 10px;
            transition: min-height 0.3s;
        }
        .hint-anim-area.active { min-height: 360px; }

        .hint-canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: #f0f8ff;
            border: 2px solid #dfe6e9;
        }
        .hint-canvas-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
            animation: canvasPop 0.5s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes canvasPop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .parts-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 10px 0 14px;
            flex-wrap: wrap;
        }
        .part-card {
            width: 68px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2em;
            font-weight: bold;
            border-radius: 16px;
            background: #f0f0f5;
            color: #888;
            border: 3px solid #ddd;
            transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
            opacity: 0;
            transform: scale(0) rotate(-10deg);
        }
        .part-card.show {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }
        .part-card.active {
            background: linear-gradient(135deg, #feca57, #ff9f43);
            color: #fff;
            border-color: #ff6348;
            transform: scale(1.25) rotate(3deg);
            box-shadow: 0 6px 20px rgba(255,99,72,0.4);
            animation: partPulse 0.4s ease;
        }
        .part-card.done {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: #fff;
            border-color: #2ecc71;
            transform: scale(1) rotate(0deg);
            box-shadow: none;
        }
        @keyframes partPulse {
            0% { transform: scale(1) rotate(0deg); }
            40% { transform: scale(1.4) rotate(5deg); }
            70% { transform: scale(1.15) rotate(-2deg); }
            100% { transform: scale(1.25) rotate(3deg); }
        }
        .part-separator {
            font-size: 1.8em;
            color: #ccc;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .part-separator.show { opacity: 1; }

        .hint-text-anim {
            font-size: 1em;
            line-height: 1.8;
            color: #636e72;
            padding: 10px 14px;
            background: linear-gradient(135deg, #fff9e6, #fff3cd);
            border-radius: 14px;
            border: 2px solid #feca57;
            text-align: left;
            animation: hintPop 0.4s ease;
            margin-top: 6px;
        }
        @keyframes hintPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .hint-text-anim .word {
            display: inline;
            transition: color 0.2s, font-weight 0.2s;
        }
        .hint-text-anim .word.hl {
            color: #e17055;
            font-weight: bold;
            background: rgba(254,202,87,0.3);
            border-radius: 4px;
            padding: 0 2px;
        }
        .hint-text-anim .word.past {
            color: #636e72;
            font-weight: normal;
            background: none;
        }

        /* 飘浮装饰粒子 */
        .hint-sparkle {
            position: absolute;
            font-size: 1.4em;
            pointer-events: none;
            animation: sparkleFloat 1.5s ease forwards;
            z-index: 10;
        }
        @keyframes sparkleFloat {
            0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translateY(-60px) scale(0.3) rotate(180deg); }
        }

        .btn-hint:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-pass { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .btn-fail { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }

        .result-list {
            text-align: left;
            margin: 16px 0;
            max-height: 260px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 12px;
        }
        .result-list::-webkit-scrollbar { width: 6px; }
        .result-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

        .result-item {
            display: flex;
            align-items: center;
            padding: 8px 4px;
            border-bottom: 1px solid #f1f2f6;
            font-size: 1.05em;
        }
        .result-item:last-child { border-bottom: none; }
        .result-item .r-char {
            font-size: 1.6em;
            font-weight: bold;
            width: 50px;
            text-align: center;
        }
        .result-item .r-status {
            margin-left: auto;
            font-size: 1.3em;
        }

        .score-big {
            font-size: 3em;
            font-weight: bold;
            color: #2d3436;
            margin: 8px 0;
        }
        .score-label { color: #636e72; font-size: 1em; }

        .stars-row {
            font-size: 2.2em;
            margin: 12px 0;
            letter-spacing: 4px;
        }

        /* ===== 全对庆祝 ===== */
        .confetti {
            position: fixed;
            width: 10px; height: 10px;
            border-radius: 2px;
            pointer-events: none;
            z-index: 999;
            animation: confettiFall 2s ease forwards;
        }
        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
        }

        .trophy-bounce {
            animation: trophyBounce 0.6s ease;
        }
        @keyframes trophyBounce {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="card">
    <!-- ===== 首页 ===== -->
    <div id="startScreen">
        <div class="title-emoji">📚</div>
        <h1>四五快读 · 第二册</h1>
        <p class="subtitle">认字小测试</p>
        <div class="info-box">
            📋 每轮随机抽取 <b>10个字</b>，逐个展示<br>
            👨‍👩‍👧 家长出示汉字，让孩子认读<br>
            ✅ 认对了点 <b>认识</b>，不认识点 <b>不认识</b><br>
            🏆 最后查看得分和详情
        </div>
        <button class="btn btn-green" onclick="startTest()">开始测试</button>
    </div>

    <!-- ===== 测试页 ===== -->
    <div id="testScreen" class="hidden">
        <div class="progress-text" id="progressText">第 1 / 10 字</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="char-display" id="charDisplay">人</div>
        <div class="char-hint" id="charHint">请让孩子认读这个字</div>
        <div class="hint-anim-area" id="hintAnimArea"></div>
        <button class="btn-hint" id="hintBtn" onclick="speakTip()">💡 教我怎么记</button>
        <div class="btn-group">
            <button class="btn btn-pass" onclick="mark(true)">✅ 认识</button>
            <button class="btn btn-fail" onclick="mark(false)">❌ 不认识</button>
        </div>
    </div>

    <!-- ===== 结果页 ===== -->
    <div id="resultScreen" class="hidden">
        <div id="resultEmoji" class="title-emoji">🎉</div>
        <div id="resultTitle"><h1>测试完成！</h1></div>
        <div class="score-label">本次得分</div>
        <div class="score-big" id="scoreBig">10 / 10</div>
        <div class="stars-row" id="starsRow"></div>
        <div class="result-list" id="resultList"></div>
        <div style="margin-top:20px;">
            <button class="btn btn-blue" onclick="startTest()" style="margin-right:10px;">再测一次</button>
            <button class="btn btn-orange" onclick="backHome()">返回首页</button>
        </div>
    </div>
</div>

// ===== Canvas 绘图辅助 =====
function _face(c,x,y,r,skin='#ffd93d',eyeColor='#2d3436'){
    c.fillStyle=skin;c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();
    c.fillStyle=eyeColor;c.beginPath();c.arc(x-r*.3,y-r*.15,r*.09,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x+r*.3,y-r*.15,r*.09,0,Math.PI*2);c.fill();
    c.strokeStyle=eyeColor;c.lineWidth=Math.max(1.5,r*.06);c.beginPath();c.arc(x,y+r*.1,r*.28,.1*Math.PI,.9*Math.PI);c.stroke();
    c.fillStyle='rgba(255,140,140,.35)';c.beginPath();c.arc(x-r*.5,y+r*.2,r*.13,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x+r*.5,y+r*.2,r*.13,0,Math.PI*2);c.fill();
}
function _stick(c,x,y,h,pose='stand',col='#e17055'){
    c.strokeStyle=col;c.lineWidth=3;c.lineCap='round';
    // head
    c.fillStyle='#ffd93d';c.beginPath();c.arc(x,y-h*.7,h*.12,0,Math.PI*2);c.fill();c.stroke();
    // body
    c.beginPath();c.moveTo(x,y-h*.58);c.lineTo(x,y-h*.2);c.stroke();
    // legs
    let lx=x-h*.15,rx=x+h*.15,by=y;
    if(pose==='run'){lx=x-h*.25;rx=x+h*.25;by=y-h*.05;}
    if(pose==='jump'){lx=x-h*.2;rx=x+h*.2;by=y-h*.15;}
    c.beginPath();c.moveTo(x,y-h*.2);c.lineTo(lx,by);c.stroke();
    c.beginPath();c.moveTo(x,y-h*.2);c.lineTo(rx,by);c.stroke();
    // arms
    let la=-.7*Math.PI,ra=-.3*Math.PI;
    if(pose==='wave'){ra=-.1*Math.PI;}
    if(pose==='run'){la=-.5*Math.PI;ra=-.5*Math.PI;}
    if(pose==='jump'){la=-.9*Math.PI;ra=-.1*Math.PI;}
    if(pose==='reach'){la=ra=-.5*Math.PI;}
    c.beginPath();c.moveTo(x,y-h*.5);c.lineTo(x+Math.cos(la)*h*.3,y-h*.5+Math.sin(la)*h*.3);c.stroke();
    c.beginPath();c.moveTo(x,y-h*.5);c.lineTo(x+Math.cos(ra)*h*.3,y-h*.5+Math.sin(ra)*h*.3);c.stroke();
}
function _sun(c,x,y,r){
    c.fillStyle='#feca57';c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();
    c.strokeStyle='#f39c12';c.lineWidth=2;
    for(let i=0;i<8;i++){let a=i*Math.PI/4;c.beginPath();c.moveTo(x+Math.cos(a)*(r+4),y+Math.sin(a)*(r+4));c.lineTo(x+Math.cos(a)*(r+14),y+Math.sin(a)*(r+14));c.stroke();}
    c.fillStyle='#f39c12';c.beginPath();c.arc(x-r*.25,y-r*.2,r*.08,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x+r*.25,y-r*.2,r*.08,0,Math.PI*2);c.fill();
    c.strokeStyle='#e17055';c.lineWidth=1.5;c.beginPath();c.arc(x,y+r*.1,r*.25,.1*Math.PI,.9*Math.PI);c.stroke();
}
function _cloud(c,x,y,r,col='#dfe6e9'){
    c.fillStyle=col;c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.arc(x-r*.7,y+r*.2,r*.7,0,Math.PI*2);c.arc(x+r*.7,y+r*.2,r*.7,0,Math.PI*2);c.arc(x-r*.3,y+r*.3,r*.6,0,Math.PI*2);c.arc(x+r*.3,y+r*.3,r*.6,0,Math.PI*2);c.fill();
}
function _tree(c,x,y,h,col='#27ae60'){
    c.fillStyle='#795548';c.fillRect(x-4,y-h*.2,8,h*.2);
    c.fillStyle=col;c.beginPath();c.arc(x,y-h*.4,h*.3,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x-h*.15,y-h*.25,h*.22,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x+h*.15,y-h*.25,h*.22,0,Math.PI*2);c.fill();
}
function _bird(c,x,y,s,col='#6c5ce7'){
    c.fillStyle=col;c.beginPath();c.ellipse(x,y,s*1.2,s,0,0,Math.PI*2);c.fill();
    c.fillStyle='#e17055';c.beginPath();c.moveTo(x+s*1.2,y-s*.1);c.lineTo(x+s*1.8,y+s*.05);c.lineTo(x+s*1.2,y+s*.2);c.fill();
    c.fillStyle='#fff';c.beginPath();c.arc(x+s*.4,y-s*.3,s*.25,0,Math.PI*2);c.fill();
    c.fillStyle='#2d3436';c.beginPath();c.arc(x+s*.5,y-s*.3,s*.12,0,Math.PI*2);c.fill();
    c.strokeStyle=col;c.lineWidth=2;c.beginPath();c.moveTo(x-s*.5,y-s*.3);c.quadraticCurveTo(x-s*1.5,y-s*1.2,x-s*1.8,y-s*.5);c.stroke();
    c.beginPath();c.moveTo(x-s*.5,y+s*.1);c.quadraticCurveTo(x-s*1.5,y-s*.8,x-s*1.8,y-s*.1);c.stroke();
}
function _fish(c,x,y,s,col='#0984e3'){
    c.fillStyle=col;c.beginPath();c.ellipse(x,y,s*1.5,s,0,0,Math.PI*2);c.fill();
    c.beginPath();c.moveTo(x-s*1.5,y);c.lineTo(x-s*2.2,y-s*.8);c.lineTo(x-s*2.2,y+s*.8);c.fill();
    c.fillStyle='#fff';c.beginPath();c.arc(x+s*.5,y-s*.3,s*.25,0,Math.PI*2);c.fill();
    c.fillStyle='#2d3436';c.beginPath();c.arc(x+s*.6,y-s*.3,s*.12,0,Math.PI*2);c.fill();
    c.strokeStyle='#2d3436';c.lineWidth=1.5;c.beginPath();c.arc(x+s*.1,y+s*.2,s*.15,0,Math.PI);c.stroke();
}
function _mountain(c,x,y,w,h,col='#6ab04c'){
    c.fillStyle=col;c.beginPath();c.moveTo(x-w/2,y);c.lineTo(x,y-h);c.lineTo(x+w/2,y);c.fill();
    c.fillStyle='#fff';c.beginPath();c.moveTo(x-w*.15,y-h*.7);c.lineTo(x,y-h);c.lineTo(x+w*.15,y-h*.7);c.fill();
}
function _speech(c,x,y,w,h,text){
    c.fillStyle='#fff';c.strokeStyle='#b2bec3';c.lineWidth=1.5;
    c.beginPath();c.moveTo(x-w/2+10,y-h/2);c.lineTo(x+w/2-10,y-h/2);c.quadraticCurveTo(x+w/2,y-h/2,x+w/2,y-h/2+10);c.lineTo(x+w/2,y+h/2-10);c.quadraticCurveTo(x+w/2,y+h/2,x+w/2-10,y+h/2);c.lineTo(x-w/2+10,y+h/2);c.quadraticCurveTo(x-w/2,y+h/2,x-w/2,y+h/2-10);c.lineTo(x-w/2,y-h/2+10);c.quadraticCurveTo(x-w/2,y-h/2,x-w/2+10,y-h/2);c.fill();c.stroke();
    c.beginPath();c.moveTo(x-5,y+h/2);c.lineTo(x-10,y+h/2+12);c.lineTo(x+8,y+h/2);c.fill();c.stroke();
    c.fillStyle='#2d3436';c.font='bold 14px sans-serif';c.textAlign='center';c.fillText(text,x,y+5);
}
function _water(c,x,y,w){
    c.strokeStyle='#74b9ff';c.lineWidth=2;c.beginPath();
    for(let i=0;i<3;i++){let yy=y+i*8;c.beginPath();c.moveTo(x-w/2,yy);for(let j=0;j<=w;j+=10)c.quadraticCurveTo(x-w/2+j+5,yy+(j%20===0?-4:4),x-w/2+j+10,yy);c.stroke();}
}
function _snowflake(c,x,y,r){
    c.strokeStyle='#74b9ff';c.lineWidth=1.5;
    for(let i=0;i<6;i++){let a=i*Math.PI/3;c.beginPath();c.moveTo(x,y);c.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);c.stroke();
    let mx=x+Math.cos(a)*r*.6,my=y+Math.sin(a)*r*.6;
    c.beginPath();c.moveTo(mx,my);c.lineTo(mx+Math.cos(a+.5)*r*.25,my+Math.sin(a+.5)*r*.25);c.stroke();
    c.beginPath();c.moveTo(mx,my);c.lineTo(mx+Math.cos(a-.5)*r*.25,my+Math.sin(a-.5)*r*.25);c.stroke();}
}
function _house(c,x,y,s,col='#e17055'){
    c.fillStyle=col;c.fillRect(x-s/2,y-s*.4,s,s*.6);
    c.fillStyle='#795548';c.beginPath();c.moveTo(x-s*.6,y-s*.4);c.lineTo(x,y-s*.9);c.lineTo(x+s*.6,y-s*.4);c.fill();
    c.fillStyle='#feca57';c.fillRect(x-s*.12,y-s*.2,s*.24,s*.3);
    c.fillStyle='#636e72';c.fillRect(x+s*.2,y-s*.1,s*.2,s*.2);
}

// ===== 绘制字符插图 =====
function drawCharCanvas(ch) {
    const area = document.getElementById('hintAnimArea');
    const wrap = document.createElement('div');
    wrap.className = 'hint-canvas-wrap';
    const canvas = document.createElement('canvas');
    canvas.width = 200; canvas.height = 180;
    canvas.className = 'hint-canvas';
    wrap.appendChild(canvas);
    area.insertBefore(wrap, area.firstChild);
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,200,180);
    if (CHAR_DRAWINGS[ch]) CHAR_DRAWINGS[ch](ctx);
}
let hintTimers = [];

function clearHintTimers() {
    hintTimers.forEach(t => {
        if (t && typeof t === 'object' && t.clear) t.clear();
        else clearTimeout(t);
    });
    hintTimers = [];
}

function speakTip() {
    const ch = roundChars[currentIdx];
    const data = CHAR_DATA[ch];
    if (!data) return;

    const btn = document.getElementById('hintBtn');
    const charEl = document.getElementById('charDisplay');
    const animArea = document.getElementById('hintAnimArea');
    btn.disabled = true;
    btn.textContent = '🔊 正在播放...';

    // 清理
    speechSynthesis.cancel();
    clearHintTimers();
    charEl.classList.add('hint-active');
    animArea.innerHTML = '';
    animArea.classList.add('active');

    // 0. 绘制 Canvas 插图
    drawCharCanvas(ch);

    const parts = data.parts;
    const tip = data.tip;

    // 1. 构建部件卡片
    if (parts.length > 0) {
        let partsHTML = '<div class="parts-row" id="partsRow">';
        parts.forEach((p, i) => {
            if (i > 0) partsHTML += '<span class="part-separator">+</span>';
            partsHTML += `<div class="part-card" data-pi="${i}">${p}</div>`;
        });
        partsHTML += '</div>';
        animArea.insertAdjacentHTML('beforeend', partsHTML);

        // 逐个弹出部件卡片
        const cards = animArea.querySelectorAll('.part-card');
        const seps = animArea.querySelectorAll('.part-separator');
        cards.forEach((card, i) => {
            hintTimers.push(setTimeout(() => {
                card.classList.add('show');
                if (seps[i - 1]) seps[i - 1].classList.add('show');
                playTone(400 + i * 100, 0.1);
            }, i * 400));
        });

        // 高亮部件卡片（等卡片全部弹出后开始）
        const highlightStart = parts.length * 400 + 300;
        const perPartDuration = 1500;

        parts.forEach((_, i) => {
            // 高亮第 i 个
            hintTimers.push(setTimeout(() => {
                // 取消上一个高亮
                cards.forEach(c => { c.classList.remove('active'); c.classList.add('done'); });
                cards[i].classList.remove('done');
                cards[i].classList.add('active');
                spawnHintSparkle(animArea);
                playTone(600 + i * 80, 0.08);
            }, highlightStart + i * perPartDuration));
        });

        // 全部高亮结束
        hintTimers.push(setTimeout(() => {
            cards.forEach(c => { c.classList.remove('active'); c.classList.add('done'); });
        }, highlightStart + parts.length * perPartDuration));
    }

    // 2. 构建文字提示（部件卡片下方）
    const textDelay = parts.length > 0 ? parts.length * 400 + 300 : 200;
    hintTimers.push(setTimeout(() => {
        // 找到部件文字在 tip 中的位置，用于高亮
        const allPartChars = parts.map(p => p.split('')).flat();

        let textHTML = '<div class="hint-text-anim" id="hintTextAnim">';
        for (let i = 0; i < tip.length; i++) {
            const c = tip[i];
            const isPartChar = allPartChars.includes(c);
            textHTML += `<span class="word${isPartChar ? ' part-keyword' : ''}" data-i="${i}">${c}</span>`;
        }
        textHTML += '</div>';
        animArea.insertAdjacentHTML('beforeend', textHTML);

        // 逐字高亮
        const spans = animArea.querySelectorAll('.hint-text-anim .word');
        let idx = 0;
        const charInterval = Math.max(90, tip.length > 30 ? 90 : 110);
        const textTimer = setInterval(() => {
            if (idx > 0 && spans[idx - 1]) {
                spans[idx - 1].classList.remove('hl');
                spans[idx - 1].classList.add('past');
            }
            if (idx < spans.length) {
                spans[idx].classList.add('hl');
                idx++;
            } else {
                clearInterval(textTimer);
            }
        }, charInterval);
        hintTimers.push({ clear: () => clearInterval(textTimer) });
    }, textDelay));

    // 3. 语音
    const utter = new SpeechSynthesisUtterance(tip);
    utter.lang = 'zh-CN';
    utter.rate = 0.8;
    utter.pitch = 1.2;

    utter.onend = () => {
        resetHintUI(btn, charEl, animArea);
    };
    utter.onerror = () => {
        resetHintUI(btn, charEl, animArea);
    };

    speechSynthesis.speak(utter);
}

function resetHintUI(btn, charEl, animArea) {
    btn.disabled = false;
    btn.textContent = '💡 教我怎么记';
    charEl.classList.remove('hint-active');
    clearHintTimers();
}

function spawnHintSparkle(container) {
    const emojis = ['✨','🌟','💫','⭐','🎊','🎈'];
    const el = document.createElement('div');
    el.className = 'hint-sparkle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = (10 + Math.random() * 80) + '%';
    el.style.bottom = '0';
    container.appendChild(el);
    setTimeout(() => el.remove(), 1500);
}

const ROUND_SIZE = 10;

// ===== 工具 =====
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

// ===== 音效 =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playTone(freq, dur, type = 'sine') {
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
}

function sfxCorrect() {
    playTone(523, 0.1);
    setTimeout(() => playTone(659, 0.1), 100);
    setTimeout(() => playTone(784, 0.15), 200);
}

function sfxWrong() {
    playTone(250, 0.25, 'sawtooth');
}

// 全对庆祝音效：一段上行旋律 + 和弦
function sfxCelebrate() {
    const notes = [523, 587, 659, 698, 784, 880, 988, 1047];
    notes.forEach((f, i) => {
        setTimeout(() => playTone(f, 0.15, 'sine'), i * 120);
    });
    // 尾音和弦
    setTimeout(() => {
        playTone(1047, 0.6);
        playTone(784, 0.6);
        playTone(523, 0.6);
    }, notes.length * 120 + 50);
}

// ===== 彩带 =====
function launchConfetti() {
    const colors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#01a3a4','#f368e0'];
    for (let i = 0; i < 60; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top = -10 + 'px';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.width = (6 + Math.random() * 8) + 'px';
        c.style.height = (6 + Math.random() * 8) + 'px';
        c.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
        c.style.animationDelay = Math.random() * 0.8 + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3000);
    }
}

// ===== 游戏状态 =====
let roundChars = [];
let currentIdx = 0;
let results = []; // {char, correct}

function startTest() {
    roundChars = shuffle(ALL_CHARS).slice(0, ROUND_SIZE);
    currentIdx = 0;
    results = [];
    hide('startScreen');
    hide('resultScreen');
    show('testScreen');
    showChar();
}

function showChar() {
    speechSynthesis.cancel();
    clearHintTimers();
    const ch = roundChars[currentIdx];
    const charEl = document.getElementById('charDisplay');
    charEl.textContent = ch;
    charEl.classList.remove('hint-active');
    document.getElementById('progressText').textContent = `第 ${currentIdx + 1} / ${ROUND_SIZE} 字`;
    document.getElementById('progressFill').style.width = (currentIdx / ROUND_SIZE * 100) + '%';
    document.getElementById('charHint').textContent = '请让孩子认读这个字';
    const animArea = document.getElementById('hintAnimArea');
    animArea.innerHTML = '';
    animArea.classList.remove('active');
    const btn = document.getElementById('hintBtn');
    btn.disabled = false;
    btn.textContent = '💡 教我怎么记';
}

function mark(correct) {
    const ch = roundChars[currentIdx];
    results.push({ char: ch, correct });
    if (correct) sfxCorrect(); else sfxWrong();

    currentIdx++;
    if (currentIdx >= ROUND_SIZE) {
        showResult();
    } else {
        showChar();
    }
}

function showResult() {
    hide('testScreen');
    show('resultScreen');

    const correctCount = results.filter(r => r.correct).length;
    document.getElementById('scoreBig').textContent = `${correctCount} / ${ROUND_SIZE}`;

    // 星星
    const starCount = correctCount === ROUND_SIZE ? 5
        : correctCount >= 8 ? 4
        : correctCount >= 6 ? 3
        : correctCount >= 4 ? 2 : 1;
    document.getElementById('starsRow').textContent = '⭐'.repeat(starCount) + '☆'.repeat(5 - starCount);

    // emoji & title
    const emojiEl = document.getElementById('resultEmoji');
    const titleEl = document.getElementById('resultTitle');
    if (correctCount === ROUND_SIZE) {
        emojiEl.textContent = '🏆';
        emojiEl.classList.add('trophy-bounce');
        titleEl.innerHTML = '<h1 style="color:#f9ca24">全部认识！太厉害了！</h1>';
    } else if (correctCount >= 8) {
        emojiEl.textContent = '🎉';
        emojiEl.classList.remove('trophy-bounce');
        titleEl.innerHTML = '<h1>非常棒！</h1>';
    } else if (correctCount >= 6) {
        emojiEl.textContent = '😊';
        emojiEl.classList.remove('trophy-bounce');
        titleEl.innerHTML = '<h1>继续加油！</h1>';
    } else {
        emojiEl.textContent = '💪';
        emojiEl.classList.remove('trophy-bounce');
        titleEl.innerHTML = '<h1>多多练习就会了！</h1>';
    }

    // 详情列表
    const listEl = document.getElementById('resultList');
    listEl.innerHTML = results.map(r =>
        `<div class="result-item">
            <span class="r-char">${r.char}</span>
            <span>${r.correct ? '' : '不认识'}</span>
            <span class="r-status">${r.correct ? '✅' : '❌'}</span>
        </div>`
    ).join('');

    // 全对：庆祝音效 + 彩带
    if (correctCount === ROUND_SIZE) {
        setTimeout(() => {
            sfxCelebrate();
            launchConfetti();
        }, 300);
    }
}

function backHome() {
    hide('resultScreen');
    hide('testScreen');
    show('startScreen');
}
